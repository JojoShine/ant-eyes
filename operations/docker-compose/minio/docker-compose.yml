version: '2.3'

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
      TZ: Asia/Shanghai

    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"

    networks:
      - minio_network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

    # 资源限制 (需要 Docker Compose v3+ 和 Swarm 模式)
    # 如需限制资源，请使用: docker run --cpus=2 --memory=2g
    mem_limit: 2g
    cpus: 2

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  minio_data:
    driver: local

networks:
  minio_network:
    driver: bridge
