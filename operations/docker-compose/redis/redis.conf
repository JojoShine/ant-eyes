################################## NETWORK #####################################

# Accept connections only from clients running on the same machine.
bind 127.0.0.1 ::1

# Protected mode is a layer of security protection, in order to avoid that
# Redis instances left open on the internet are accessed and exploited.
protected-mode yes

# Accept connections on the specified port, default is 6379.
port 6379

# Set the backlog of pending connections.
tcp-backlog 511

# Set the timeout for idle clients.
timeout 0

# TCP keepalive.
tcp-keepalive 300

################################# TLS/SSL #####################################
# By default, TLS/SSL is disabled. To enable it, the "tls-port" configuration
# directive must be set to an integer value that will be the port where the
# TLS socket will listen to.
tls-port 0

################################# GENERAL #####################################

# By default Redis does not run as a daemon. Use 'yes' if you want it to run as a daemon.
daemonize no

# Set the server verbosity to the specified level.
# This can be one of:
# debug (a lot of info, useful for development/testing)
# verbose (many rarely useful info, but not a mess like the debug level)
# notice (moderately verbose, what you want in production probably)
# warning (only very important / critical messages are logged)
loglevel notice

# Specify the log file name.
logfile ""

# Set the number of databases. The default database is DB 0
databases 16

################################ SNAPSHOTTING  ################################

# Save the DB on disk.
save 900 1
save 300 10
save 60 10000

# By default Redis will stop accepting writes if RDB snapshots are enabled
# (at least one save point) and the latest background save failed.
stop-writes-on-bgsave-error yes

# Compress string objects using LZ4 when dump .rdb databases.
rdbcompression yes

# The filename for the DB
dbfilename dump.rdb

# The working directory.
dir ./

################################# REPLICATION #################################

# Master/Slave replication. Use slaveof to make a Redis instance a copy of
# another Redis server.
# slaveof <masterip> <masterport>

# If the master is password protected (using the "requirepass" setting below)
# it is possible to tell the slave to authenticate before starting the replication
# synchronization process, possibly other replication related operations.
# masterauth <master-password>

# When a slave loses its connection with the master, or when the replication
# is still in progress, the slave can act in two different ways:
# 1) if slave-serve-stale-data is set to 'yes' (the default) the slave will
#    still reply to client requests, possibly with out of date data, or the
#    data set may just be empty if this is the first synchronization.
# 2) if slave-serve-stale-data is set to 'no' the slave will reply with
#    an error "SYNC with master in progress" to all the kind of commands
#    but to INFO, SLAVEOF or SHUTDOWN
slave-serve-stale-data yes

# You can configure a slave instance to accept writes or not.
slave-read-only yes

# Disable TCP_NODELAY on the replica socket after SYNC?
repl-disable-tcp-nodelay no

# Set the replication backlog size.
repl-backlog-size 1mb

# When a slave reconnects and the replication backlog is large enough to retain
# the slave's replication offset, psync will be used. The slave will only do a
# full resynchronization when the replication backlog is not large enough.
repl-backlog-ttl 3600

# The slave priority is an integer number published by Redis in the INFO output.
# It is used by Redis Sentinel in order to select a slave to promote into a master
# if the master is no longer working correctly.
slave-priority 100

################################## SECURITY ###################################

# Require a password for clients to execute commands
# requirepass foobared

################################### CLIENTS ####################################

# Set the max number of connected clients.
maxclients 10000

############################## MEMORY MANAGEMENT ###############################

# Set a memory usage limit.
maxmemory 512mb

# How Redis will select what to remove when maxmemory is reached.
# Options: volatile-lru, allkeys-lru, volatile-lfu, allkeys-lfu, volatile-random, allkeys-random, volatile-ttl, noeviction
maxmemory-policy allkeys-lru

# Samples for eviction
maxmemory-samples 5

############################# LAZY FREEING ####################################

lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

############################ KERNEL OOM CONTROL ##############################

oom-score-adj no

######################## KERNEL TRANSPARENT HUGEPAGE #########################

disable-thp yes

############################## APPEND ONLY MODE ###############################

# By default Redis asynchronously dumps the dataset on disk.
# If you can live with some data loss but want to avoid fsync (which improves
# performance), you can comment out the following line.
appendonly yes

# The name of the append only file (default: "appendonly.aof")
appendfilename "appendonly.aof"

# The fsync() call tells the Operating System to actually write data on disk
# instead of just waiting for more data in the output buffer.
# fsync strategies:
# appendfsync always - fsync after every write to the AOF. Very slow.
# appendfsync everysec - fsync only one time per second. Compromise.
# appendfsync no - Never fsync. Let the OS flush the data when it wants. Faster.
appendfsync everysec

# When the AOF fsync policy is set to always or everysec, and a background
# saving process (a background rewrite of the AOF file) is scheduled, Redis
# might block on fsync() call.
no-appendfsync-on-rewrite no

# Automatic rewrite of the append only file.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

################################ LUA SCRIPTING  ###############################

# Max execution time for Lua scripts in milliseconds.
lua-time-limit 5000

################################ REDIS CLUSTER  ###############################

# Cluster support is disabled by default.
# cluster-enabled yes

# The cluster config file is auto-generated by a Redis Cluster node, never
# edit this file by hand.
# cluster-config-file nodes.conf

# Cluster node timeout is the amount of milliseconds a node must be unreachable
# for it to be considered in failure state.
# cluster-node-timeout 15000

################################## SLOW LOG ###################################

# The Redis Slow Log is a system to log queries that exceed a specified
# execution time. The execution time does not include I/O operations
# like talking with the client, sending the reply, etc. just the time
# needed to actually execute the command.
slowlog-log-slower-than 10000

# There is no limit to this length. Just be aware that it will consume memory.
slowlog-max-len 128

################################ LATENCY MONITOR ##############################

# The Redis latency monitoring subsystem samples different operations
# at sampling intervals in order to collect data relating to possible
# sources of latency of a Redis instance.
latency-monitor-threshold 0

############################# EVENT NOTIFICATION ##############################

# Redis can notify Pub/Sub clients about events happening in the key space.
notify-keyspace-events ""

############################### ADVANCED CONFIG ###############################

# Hashes are encoded using a memory efficient data structure when they have a
# small number of entries, and the biggest entry does not exceed a given
# threshold. These thresholds cannot be changed at runtime.
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Lists are also encoded in a special way to save a lot of space.
# The number of entries allowed per internal list node can be specified
# as a fixed maximum size or a maximum number of elements.
list-max-ziplist-size -2
list-compress-depth 0

# Sets have a special encoding in just one case: when a set is composed
# of just strings that happen to be integers in radix 10 in the range
# of 64 bit signed integers.
set-max-intset-entries 512

# Similarly to hashes and lists, sorted sets are also specially encoded in
# order to save a lot of space.
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog
hll-sparse-max-bytes 3000

# Streams macro node max size / items are also user configurable via
# stream-node-max-bytes and stream-node-max-entries. These settings may be
# altered as performance testing deems appropriate for your application.
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing of the main dictionary happens every 100 ms of CPU time
# used by the server in order to perform background tasks.
activerehashing yes

# Client output buffer limits can be used to force disconnection of clients
# which are not reading data from the server fast enough for some reason
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of rehashing the main dict
hz 10

# Enable active defragmentation
activedefrag yes

# Minimum percentage of fragmentation to start active defrag
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10

# Maximum percentage of fragmentation at which we use maximum effort
active-defrag-threshold-upper 100

# Minimal effort for defrag in CPU percentage
active-defrag-cycle-min 25

# Maximal effort for defrag in CPU percentage
active-defrag-cycle-max 75
