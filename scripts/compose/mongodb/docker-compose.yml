version: '2.3'

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-myapp}
      TZ: Asia/Shanghai

    ports:
      - "${MONGO_PORT:-27017}:27017"

    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - mongo_logs:/var/log/mongodb
      - ./init-scripts:/docker-entrypoint-initdb.d:ro

    command:
      - mongod
      - --auth
      - --bind_ip_all
      - --wiredTigerCacheSizeGB
      - "0.5"

    networks:
      - mongo_network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # 资源限制 (docker-compose v2.3 兼容方式)
    mem_limit: 2g
    cpus: 2

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  mongo_logs:
    driver: local

networks:
  mongo_network:
    driver: bridge
